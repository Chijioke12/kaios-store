<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KaiOS Store</title>
    <style>
        /* KaiOS Reset & Typography */
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: sans-serif; background-color: #f4f4f4;
            overflow: hidden; 
        }

        /* Use Flexbox for robust KaiOS screen sizing */
        #app-root {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        /* --- UI COMPONENTS --- */
        .header {
            flex-shrink: 0;
            background-color: #2c3e50;
            color: #fff;
            padding: 6px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
        }

        /* Tabs UI */
        .tabs {
            flex-shrink: 0;
            display: flex;
            background-color: #34495e;
            border-bottom: 2px solid #ddd;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 8px;
            color: #95a5a6;
            font-size: 13px;
            font-weight: bold;
        }
        .tab.active {
            color: #fff;
            border-bottom: 3px solid #3498db;
        }

        /* Search UI */
        .search-container {
            flex-shrink: 0;
            padding: 6px;
            background: #e0e0e0;
        }
        #search-box {
            width: 100%;
            padding: 6px;
            border: 2px solid transparent;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }
        #search-box.focused {
            border-color: #3498db;
            background-color: #fff;
        }

        /* List UI */
        .list-container {
            flex-grow: 1;
            overflow-y: scroll;
            background: #fff;
        }
        .list-container::-webkit-scrollbar { display: none; }

        .item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            color: #333;
        }
        .item.focused {
            background-color: #3498db;
            color: #fff;
        }

        .item-icon-wrapper {
            width: 32px; height: 32px; margin-right: 12px; border-radius: 6px;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            background-color: #ddd; flex-shrink: 0;
        }
        .item-icon-img { width: 100%; height: 100%; object-fit: cover; background-color: #fff; }
        .item-icon-fallback { font-size: 14px; font-weight: bold; color: white; text-transform: uppercase; }
        .fallback-game { background-color: #9b59b6; }
        .fallback-app { background-color: #e67e22; }

        .item-text-container { flex-grow: 1; overflow: hidden; }
        .item-name { font-size: 14px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .item-category { font-size: 10px; text-transform: uppercase; opacity: 0.7; }
        .message { padding: 20px; text-align: center; font-size: 14px; color: #666; }

        /* --- KAIOS SOFTKEY BAR --- */
        .softkey-bar {
            flex-shrink: 0;
            height: 30px;
            background-color: #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
            font-size: 12px;
            font-weight: bold;
            color: #333;
            border-top: 1px solid #ccc;
        }
        .sk-left, .sk-right { width: 30%; text-transform: uppercase; }
        .sk-left { text-align: left; }
        .sk-right { text-align: right; }
        .sk-center { width: 40%; text-align: center; text-transform: uppercase; font-size: 14px; color: #2c3e50; }


        /* --- MODAL PROMPT --- */
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 30px); background: rgba(0,0,0,0.7); display: flex; flex-direction: column; justify-content: flex-end; z-index: 100; }
        .modal-content { background: #fff; padding: 12px; border-top-left-radius: 10px; border-top-right-radius: 10px; }
        .modal-title { margin: 0 0 10px 0; font-size: 14px; text-align: center; color: #333; }
        .modal-btn { padding: 10px; text-align: center; font-size: 14px; margin-bottom: 5px; background: #eee; border-radius: 5px; color: #333; }
        .modal-btn.focused { background-color: #2ecc71; color: #fff; font-weight: bold; }

        /* --- IFRAME RAM SAVER --- */
        .iframe-container { width: 100vw; height: 100vh; border: none; background: #000; }
    </style>
</head>
<body>

    <div id="app-root"></div>

    <script type="module" src="/apphub.js"></script>
</body>
</html>
